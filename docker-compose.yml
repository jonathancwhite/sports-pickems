services:
  postgres:
    image: postgres:16-alpine
    container_name: callsheet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: callsheet
      POSTGRES_PASSWORD: callsheet
      POSTGRES_DB: callsheet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callsheet -d callsheet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
