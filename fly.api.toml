# Fly.io config for the Callsheet API
# Deploy: fly deploy --config fly.api.toml

app = "callsheet-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "api"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[deploy]
  release_command = "pnpm db:migrate"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
