name: Waitlist Expiry

# Disabled until deployment — trigger manually via workflow_dispatch when ready
on:
  workflow_dispatch:

jobs:
  expiry:
    runs-on: ubuntu-latest
    steps:
      - name: Process expired waitlist invites
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: API_URL and CRON_SECRET"
            exit 1
          fi

          response=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/api/cron/waitlist-expiry" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response status: $http_code"
          echo "Response body: $body"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

          processed=$(echo "$body" | jq -r '.processed // 0')
          echo "Expired invites processed: $processed"
