name: Sync Games

# Disabled until deployment — trigger manually via workflow_dispatch when ready
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger game sync
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: API_URL and CRON_SECRET"
            exit 1
          fi

          response=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/api/cron/sync-games" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response status: $http_code"
          echo "Response body: $body"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

          scored=$(echo "$body" | jq -r '.scored // 0')
          echo "Picks scored: $scored"

          error_count=$(echo "$body" | jq -r '.errors | length // 0')
          if [ "$error_count" -gt 0 ]; then
            echo "Sync completed with $error_count error(s)"
            exit 1
          fi
